site_name: DE10-Lite NES Project
site_url: https://luis-wong.github.io/DE10-Lite-NES/about/
repo_url: https://github.com/Luis-Wong/DE10-Lite-NES
repo_name: Luis-Wong/DE10-Lite-NES
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  logo: images/controller.svg
  favicon: images/controller.svg
  palette:
    scheme: slate
    primary: red
    accent: red
  features:
    - navigation.tracking
    - navigation.top
    - toc.integrate
    - navigation.expand
    - search.highlight
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

nav:
  - About: index.md
  - Architecture: architecture.md
  - RP2A03 CPU: 
    - RP2A03.md
    - ALU.md
  - RP2C02 PPU: RP2C02.md
  - VGA Output:
    - Overview: vga_overview.md
    - Binary to 7-Segment: binary_to_7seg.md
  - References: references.md